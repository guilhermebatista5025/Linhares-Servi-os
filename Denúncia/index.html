<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal de Denúncia | macOS Style</title>
    <link rel="stylesheet" href="style-denuncia.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

    <div class="animated-background">
        <span class="shape blue-light"></span>
        <span class="shape blue-dark"></span>
        <span class="shape black"></span>
        <span class="shape blue-light delay-1"></span>
        <span class="shape blue-dark delay-2"></span>
        <span class="shape black delay-3"></span>
        <span class="shape blue-light delay-4"></span>
    </div>

    <div class="macos-window">
        <div class="titlebar">
            <div class="traffic-lights">
                <div class="light close" id="btn-close"></div>
                <div class="light minimize"></div>
                <div class="light maximize"></div>
            </div>
            <div class="window-title">Canal de Denúncia</div>
        </div>

        <div class="content">
            <h1>Relatar um problema</h1>
            <p>Sua segurança é nossa prioridade. Preencha os detalhes abaixo para análise.</p>

            <form id="denunciaForm">
                <div class="form-group">
                    <label>TIPO DE INFRAÇÃO</label>
                    <select class="macos-input" id="tipo-denuncia" required>
                        <option value="">Selecione uma categoria...</option>
                        <option value="fraude">Fraude ou Golpe</option>
                        <option value="comportamento">Comportamento Inadequado</option>
                        <option value="pagamento">Problemas com Pagamento</option>
                        <option value="outro">Outros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>DESCRIÇÃO DOS FATOS</label>
                    <textarea class="macos-input" id="descricao" rows="5" placeholder="O que aconteceu?" required></textarea>
                </div>

                <div class="actions">
                    <button type="button" class="btn btn-cancel" id="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btn-enviar">Enviar Relatório</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script-denuncia.js"></script>
</body>
</html>
